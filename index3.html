
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;
    min-height: 100vh;
    color: white;

    background: linear-gradient(
        135deg,
        #00A4EF 0%,
        #7FBA00 25%,
        #FFB900 50%,
        #F25022 100%
    );
}

#login{
    background-color: rgba(255,255,255,0.15);
    padding: 25px;
    width: 320px;
    border-radius: 10px;
}

#login input{
    width: 95%;
    padding: 10px;
    margin-top: 5px;
}

#home{
    display: none;
}

#home h1{
    font-size: 40px;
}

#home p{
    font-size: 20px;
    max-width: 700px;
    line-height: 1.6;
}

#home a{
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
}

#home a:hover{
    text-decoration: underline;
}

input[type="button"]{
    cursor: pointer;
}
</style>

<script>
function login(){
    let usuario = document.getElementById("usuario").value;
    let senha = document.getElementById("senha").value;

    if(usuario === "cadu" && senha === "0210"){
        alert("Login realizado com sucesso!");
        document.getElementById("login").style.display = "none";
        document.getElementById("home").style.display = "block";
    }else{
        alert("Usuário ou senha incorretos!");
    }
}

function logout(){
    document.getElementById("home").style.display = "none";
    document.getElementById("login").style.display = "block";

    document.getElementById("usuario").value = "";
    document.getElementById("senha").value = "";
}
</script>

</head>
<body>

<section id="login">
    <h1>FAÇA SEU LOGIN</h1>

    <input type="text" id="usuario" placeholder="Digite seu usuário">
    <br><br>

    <input type="password" id="senha" placeholder="Digite sua senha">
    <br><br>

    <input type="button" value="Entrar" onclick="login()">
</section>

<section id="home">
    <h1>LOGIN REALIZADO</h1>

    <p>
        A Microsoft é uma empresa multinacional de tecnologia fundada em 1975.
        Ela desenvolve softwares, sistemas operacionais, serviços em nuvem e
        ferramentas utilizadas por milhões de pessoas em todo o mundo.
    </p>

    <a href="https://www.microsoft.com/pt-br" target="_blank">
        Clique aqui para acessar o site da Microsoft
    </a>

    <br><br><br>

    <input type="button" value="Logout" onclick="logout()">
</section>

</body>
</html>
