<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Buscador de CEP PRO</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      min-height: 100vh;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e293b
        );

      font-family: Arial, sans-serif;

      overflow-x: hidden;

    }

    /* SIDEBAR */

    .sidebar {

      position: fixed;

      left: 0;
      top: 0;

      width: 260px;
      height: 100vh;

      background:
        linear-gradient(
          180deg,
          #111827,
          #1f2937
        );

      padding: 30px 20px;

      box-shadow: 4px 0 20px rgba(0,0,0,.3);

    }

    .sidebar h2 {

      color: white;

      margin-bottom: 40px;

      font-weight: bold;

    }

    .menu-item {

      display: flex;

      align-items: center;

      gap: 12px;

      color: #cbd5e1;

      padding: 14px;

      border-radius: 12px;

      margin-bottom: 12px;

      transition: .3s;

      cursor: pointer;

    }

    .menu-item:hover {

      background: #2563eb;

      color: white;

      transform: translateX(5px);

    }

    /* MAIN */

    .main {

      margin-left: 260px;

      padding: 40px;

    }

    /* TOPBAR */

    .topbar {

      background: rgba(255,255,255,.1);

      backdrop-filter: blur(10px);

      border-radius: 20px;

      padding: 20px 30px;

      margin-bottom: 30px;

      color: white;

      display: flex;

      justify-content: space-between;

      align-items: center;

    }

    /* CARD */

    .card-custom {

      border: none;

      border-radius: 25px;

      overflow: hidden;

      background: white;

      box-shadow: 0 10px 40px rgba(0,0,0,.2);

    }

    .card-header-custom {

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      color: white;

      padding: 30px;

    }

    .form-control {

      border-radius: 12px;

      padding: 14px;

      border: 1px solid #dbeafe;

    }

    .form-control:focus {

      border-color: #2563eb;

      box-shadow: 0 0 10px rgba(37,99,235,.3);

    }

    .btn-custom {

      border-radius: 12px;

      padding: 14px;

      font-weight: bold;

      transition: .3s;

    }

    .btn-custom:hover {

      transform: scale(1.03);

    }

    .result-box {

      background: #f8fafc;

      border-radius: 16px;

      padding: 20px;

      margin-top: 20px;

      border-left: 5px solid #2563eb;

      animation: fadeIn .5s;

    }

    .result-item {

      margin-bottom: 15px;

    }

    .result-item span {

      font-weight: bold;

      color: #2563eb;

    }

    .success-alert {

      background: #dcfce7;

      color: #166534;

      padding: 15px;

      border-radius: 12px;

      margin-bottom: 20px;

      font-weight: bold;

      border-left: 5px solid #22c55e;

    }

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform: translateY(10px);

      }

      to {

        opacity: 1;

        transform: translateY(0);

      }

    }

    /* RESPONSIVO */

    @media(max-width: 900px) {

      .sidebar {

        width: 100%;

        height: auto;

        position: relative;

      }

      .main {

        margin-left: 0;

      }

    }

  </style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <h2>
    <i class="bi bi-globe-americas"></i>
    CEP PRO
  </h2>

  <div class="menu-item">
    <i class="bi bi-house"></i>
    Dashboard
  </div>

  <div class="menu-item">
    <i class="bi bi-search"></i>
    Buscar CEP
  </div>

  <div class="menu-item">
    <i class="bi bi-map"></i>
    Região
  </div>

  <div class="menu-item">
    <i class="bi bi-compass"></i>
    Bússola
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h3 class="mb-0">
        Sistema Inteligente de CEP
      </h3>

      <small>
        Busca automática de endereço e região
      </small>

    </div>

    <div>

      <i class="bi bi-person-circle fs-1"></i>

    </div>

  </div>

  <!-- CARD -->

  <div class="card card-custom">

    <div class="card-header-custom">

      <h2>

        <i class="bi bi-geo-alt-fill"></i>

        Buscar Endereço

      </h2>

      <p class="mb-0">
        Digite um CEP válido para localizar o endereço
      </p>

    </div>

    <div class="card-body p-4">

      <!-- FORM -->

      <div class="row g-3">

        <div class="col-md-8">

          <label class="form-label">
            CEP
          </label>

          <input
            type="text"
            id="cep"
            class="form-control"
            placeholder="00000-000"
          >

        </div>

        <div class="col-md-4 d-flex align-items-end">

          <button
            class="btn btn-primary w-100 btn-custom"
            onclick="buscarCEP()"
          >

            <i class="bi bi-search"></i>

            Buscar CEP

          </button>

        </div>

      </div>

      <!-- RESULTADO -->

      <div
        class="result-box mt-4"
        id="resultado"
        style="display:none;"
      >

        <!-- ALERTA -->

        <div class="success-alert">

          <i class="bi bi-check-circle-fill"></i>

          CEP encontrado com sucesso!

        </div>

        <div class="row">

          <div class="col-md-6 result-item">

            <span>Rua:</span>

            <div id="rua"></div>

          </div>

          <div class="col-md-6 result-item">

            <span>Bairro:</span>

            <div id="bairro"></div>

          </div>

          <div class="col-md-6 result-item">

            <span>Cidade:</span>

            <div id="cidade"></div>

          </div>

          <div class="col-md-3 result-item">

            <span>Estado:</span>

            <div id="estado"></div>

          </div>

          <div class="col-md-3 result-item">

            <span>DDD:</span>

            <div id="ddd"></div>

          </div>

          <div class="col-md-6 result-item">

            <span>Região:</span>

            <div id="regiao"></div>

          </div>

          <div class="col-md-6 result-item">

            <span>Localização:</span>

            <div id="localizacao"></div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

async function buscarCEP() {

  const cep = document
    .getElementById("cep")
    .value
    .replace(/\D/g, "");

  if (cep.length !== 8) {

    alert("Digite um CEP válido");

    return;

  }

  try {

    const response = await fetch(
      `https://viacep.com.br/ws/${cep}/json/`
    );

    const data = await response.json();

    if (data.erro) {

      alert("CEP não encontrado");

      return;

    }

    /* MOSTRAR RESULTADO */

    document
      .getElementById("resultado")
      .style.display = "block";

    /* CAMPOS */

    document
      .getElementById("rua")
      .innerHTML = data.logradouro || "-";

    document
      .getElementById("bairro")
      .innerHTML = data.bairro || "-";

    document
      .getElementById("cidade")
      .innerHTML = data.localidade || "-";

    document
      .getElementById("estado")
      .innerHTML = data.uf || "-";

    document
      .getElementById("ddd")
      .innerHTML = data.ddd || "-";

    /* REGIÕES */

    const norte = [
      "AC","AP","AM","PA","RO","RR","TO"
    ];

    const nordeste = [
      "AL","BA","CE","MA","PB","PE","PI","RN","SE"
    ];

    const centroOeste = [
      "DF","GO","MT","MS"
    ];

    const sudeste = [
      "SP","RJ","MG","ES"
    ];

    const sul = [
      "PR","SC","RS"
    ];

    let regiao = "";
    let localizacao = "";

    if (norte.includes(data.uf)) {

      regiao = "Norte";
      localizacao = "⬆️ Norte do Brasil";

    }

    else if (nordeste.includes(data.uf)) {

      regiao = "Nordeste";
      localizacao = "↗️ Nordeste do Brasil";

    }

    else if (centroOeste.includes(data.uf)) {

      regiao = "Centro-Oeste";
      localizacao = "🧭 Centro-Oeste do Brasil";

    }

    else if (sudeste.includes(data.uf)) {

      regiao = "Sudeste";
      localizacao = "↘️ Sudeste do Brasil";

    }

    else if (sul.includes(data.uf)) {

      regiao = "Sul";
      localizacao = "⬇️ Sul do Brasil";

    }

    document
      .getElementById("regiao")
      .innerHTML = regiao;

    document
      .getElementById("localizacao")
      .innerHTML = localizacao;

  }

  catch (erro) {

    console.error(erro);

    alert("Erro ao buscar CEP");

  }

}

/* MÁSCARA CEP */

document
  .getElementById("cep")
  .addEventListener("input", function(e) {

    let valor = e.target.value
      .replace(/\D/g, "");

    valor = valor.replace(
      /^(\d{5})(\d)/,
      "$1-$2"
    );

    e.target.value = valor;

});

</script>

</body>
</html>
